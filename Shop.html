<html lang="en">
<head>

<title>Medimetics — Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0a0e1a;--deep:#0d1526;--teal:#3a8fa3;--teal-light:#5bb8d4;
  --steel:#1e3a4a;--silver:#b8ccd4;--white:#ffffff;--off-white:#f0f6f8;
  --gold:#c9a96e;--gold-light:#e8c98a;--pad:clamp(16px,4vw,48px);
}
html{scroll-behavior:smooth;background:#0a0e1a}
body{background:#0a0e1a;color:#f0f6f8;font-family:'Rajdhani',Georgia,sans-serif;overflow-x:hidden;min-height:100vh}
.cursor{position:fixed;width:12px;height:12px;background:var(--teal-light);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s;mix-blend-mode:screen;display:none}
.cursor-ring{position:fixed;width:40px;height:40px;border:1px solid var(--teal);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,opacity .3s;opacity:.6;display:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.2;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:16px var(--pad);display:flex;align-items:center;justify-content:space-between;background:rgba(10,14,26,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(58,143,163,.12)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:34px;height:34px;flex-shrink:0}
.logo-icon svg{width:100%;height:100%}
.nav-wordmark{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.2rem;letter-spacing:.2em;color:var(--white);text-transform:uppercase}
.nav-wordmark span{color:var(--teal-light)}
.nav-back{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--silver);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .3s}
.nav-back:hover{color:var(--teal-light)}
.nav-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ── PAGE HEADER ── */
.page-header{padding:100px var(--pad) 40px;max-width:1400px;margin:0 auto}
.page-header-inner{display:flex;flex-direction:column;gap:6px}
.page-eyebrow{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--teal);display:flex;align-items:center;gap:12px}
.page-eyebrow::before{content:'';width:24px;height:1px;background:var(--teal)}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,6vw,4.5rem);font-weight:300;line-height:1;color:var(--white)}
.page-title em{font-style:italic;color:var(--teal-light)}
.page-count{font-family:'Rajdhani',sans-serif;font-size:.8rem;letter-spacing:.15em;color:var(--silver);text-transform:uppercase}

/* ── SEARCH & FILTER BAR ── */
.shop-controls{padding:0 var(--pad) 32px;max-width:1400px;margin:0 auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-wrap{flex:1;min-width:240px;position:relative}
.search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--teal);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.search-input{width:100%;background:var(--steel);border:1px solid rgba(58,143,163,.2);color:var(--white);font-family:'Rajdhani',sans-serif;font-size:.9rem;letter-spacing:.08em;padding:13px 16px 13px 44px;outline:none;transition:border-color .3s}
.search-input::placeholder{color:var(--silver);opacity:.5}
.search-input:focus{border-color:var(--teal)}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:10px 18px;background:transparent;color:var(--silver);border:1px solid rgba(184,204,212,.2);cursor:pointer;transition:all .3s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.filter-btn:hover{border-color:var(--teal);color:var(--teal-light)}
.filter-btn.active{background:var(--teal);border-color:var(--teal);color:var(--white)}

/* ── PRODUCT GRID ── */
.shop-grid-wrap{padding:0 var(--pad) 80px;max-width:1400px;margin:0 auto}
.shop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;position:relative}

/* ── PRODUCT CARD ── */
.p-card{background:var(--steel);position:relative;overflow:visible;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .5s ease, transform .5s ease, filter .5s ease;
}

/* faded state when another card is active */
.shop-grid.has-active .p-card:not(.active){
  opacity:.18;
  filter:blur(1.5px) saturate(0.3);
  transform:scale(.97);
  pointer-events:none;
}

/* the active card zooms and stays */
.shop-grid.has-active .p-card.active{
  opacity:1;filter:none;transform:scale(1);z-index:200;
}

/* card inner elements */
.p-card-inner{position:relative;overflow:hidden;background:var(--deep);aspect-ratio:.85;display:flex;align-items:center;justify-content:center;transition:all .6s cubic-bezier(.22,.68,0,1.2)}
.p-card.active .p-card-inner{
  border-radius:0;
}
.p-card-icon{font-size:clamp(3rem,6vw,4.5rem);transition:all .6s cubic-bezier(.22,.68,0,1.2);display:block;text-align:center;line-height:1}
.p-card.active .p-card-icon{font-size:clamp(5rem,10vw,8rem);transform:scale(1.15)}

/* shine sweep on hover */
.p-card-inner::after{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);transition:left .6s;pointer-events:none}
.p-card:hover:not(.active) .p-card-inner::after{left:160%}

.p-badge{position:absolute;top:12px;left:12px;font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:4px 9px;background:var(--teal);color:var(--white);z-index:2}
.p-category{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;padding:14px 14px 0}
.p-name{font-family:'Cormorant Garamond',serif;font-size:clamp(.95rem,1.6vw,1.12rem);font-weight:400;color:var(--white);line-height:1.3;padding:4px 14px 0}
.p-price-row{display:flex;align-items:center;gap:8px;padding:8px 14px;flex-wrap:wrap}
.p-price{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--teal-light)}
.p-orig{font-family:'Rajdhani',sans-serif;font-size:.8rem;color:var(--silver);text-decoration:line-through;opacity:.55}
.p-off{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;background:var(--gold);color:var(--navy);padding:2px 6px}
.p-rating{display:flex;align-items:center;gap:5px;padding:0 14px 14px}
.p-stars{color:var(--gold);font-size:.75rem}
.p-reviews{font-family:'Rajdhani',sans-serif;font-size:.68rem;color:var(--silver)}

/* ── EXPANDED DETAIL PANEL ── */
.p-detail{
  position:absolute;
  bottom:calc(100% + 2px);
  left:0;right:0;
  background:var(--deep);
  border:1px solid rgba(58,143,163,.25);
  border-bottom:none;
  padding:0;
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:max-height .6s cubic-bezier(.22,.68,0,1.2), opacity .4s ease, padding .4s ease;
  z-index:201;
  pointer-events:none;
}
.p-card.active .p-detail{
  max-height:700px;
  opacity:1;
  padding:28px;
  pointer-events:auto;
}

/* for cards in bottom half — panel goes below */
.p-card.detail-below .p-detail{
  bottom:auto;
  top:calc(100% + 2px);
  border:1px solid rgba(58,143,163,.25);
  border-top:none;
}

.p-detail-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,2.5vw,1.6rem);font-weight:300;color:var(--white);margin-bottom:6px}
.p-detail-price-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.p-detail-price{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--teal-light)}
.p-detail-orig{font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--silver);text-decoration:line-through;opacity:.5}
.p-detail-off{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;background:var(--gold);color:var(--navy);padding:3px 9px}
.p-detail-desc{font-family:'Rajdhani',sans-serif;font-size:.88rem;line-height:1.8;color:var(--silver);margin-bottom:16px}
.p-detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.p-detail-tag{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;background:rgba(58,143,163,.12);color:var(--teal-light);border:1px solid rgba(58,143,163,.2)}
.p-detail-rating{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.p-detail-stars{color:var(--gold);font-size:.95rem;letter-spacing:2px}
.p-detail-reviews{font-family:'Rajdhani',sans-serif;font-size:.75rem;color:var(--silver)}
.p-detail-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-cart{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:12px 28px;background:linear-gradient(135deg,var(--teal),#2a7a8e);color:var(--white);border:none;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;-webkit-tap-highlight-color:transparent}
.btn-cart::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
.btn-cart:hover::before{left:100%}
.btn-cart:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(58,143,163,.4)}
.btn-close-detail{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:12px 20px;background:transparent;color:var(--silver);border:1px solid rgba(184,204,212,.2);cursor:pointer;transition:all .3s}
.btn-close-detail:hover{border-color:var(--teal);color:var(--teal-light)}

/* ECG line in detail */
.p-detail-ecg{margin-bottom:16px;opacity:.3}

/* no results */
.no-results{text-align:center;padding:80px 20px;grid-column:1/-1}
.no-results p{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--silver);font-style:italic}

/* ── OVERLAY BACKDROP ── */
.shop-backdrop{position:fixed;inset:0;background:rgba(10,14,26,.7);backdrop-filter:blur(4px);z-index:150;opacity:0;pointer-events:none;transition:opacity .5s ease}
.shop-backdrop.visible{opacity:1;pointer-events:auto}

/* ── COMBO SECTION ── */
.combos-section{padding:0 var(--pad) 80px;max-width:1400px;margin:0 auto}
.combos-header{margin-bottom:24px}
.combos-grid-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.combo-mini{background:var(--steel);padding:clamp(18px,2.5vw,28px);position:relative;overflow:hidden;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent}
.combo-mini::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:linear-gradient(to bottom,var(--teal-light),var(--gold));transition:height .4s}
.combo-mini:hover::before{height:100%}
.combo-mini:hover{background:#1f3f52}
.combo-mini-tag{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;display:block}
.combo-mini-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,1.8vw,1.25rem);font-weight:400;color:var(--white);margin-bottom:6px}
.combo-mini-price{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--teal-light)}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.shop-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){
  .shop-grid{grid-template-columns:repeat(2,1fr)}
  .combos-grid-mini{grid-template-columns:repeat(2,1fr)}
  .filter-btns{gap:6px}
  .filter-btn{padding:8px 12px;font-size:.65rem}
  .p-detail{position:fixed!important;bottom:0!important;top:auto!important;left:0!important;right:0!important;border-radius:16px 16px 0 0;border:1px solid rgba(58,143,163,.25);border-bottom:none;max-height:0;z-index:600}
  .p-card.active .p-detail{max-height:85vh;overflow-y:auto;padding:24px 20px}
}
@media(max-width:480px){
  .shop-grid{grid-template-columns:1fr}
  .combos-grid-mini{grid-template-columns:1fr}
  .shop-controls{flex-direction:column;align-items:stretch}
  .search-wrap{min-width:unset}
}
</style>
</head>

// ── BUILD GRID ────────────────────────────────────────────────────────
const grid = document.getElementById('shopGrid');
const combosGrid = document.getElementById('combosGrid');

function buildGrid(items) {
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = '<div class="no-results"><p>No products found — try a different search.</p></div>';
    return;
  }
  items.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'p-card';
    card.dataset.id = p.id;
    card.dataset.category = p.category;
    card.innerHTML = `
      <div class="p-card-inner">
        <span class="p-card-icon">${p.icon}</span>
        <span class="p-badge">${p.badge}</span>
      </div>
      <div class="p-category">${p.categoryLabel}</div>
      <div class="p-name">${p.name}</div>
      <div class="p-price-row">
        <span class="p-price">${p.price}</span>
        <span class="p-orig">${p.orig}</span>
        <span class="p-off">${p.off}</span>
      </div>
      <div class="p-rating">
        <span class="p-stars">${p.stars}</span>
        <span class="p-reviews">${p.reviews}</span>
      </div>
      <div class="p-detail">
        <svg class="p-detail-ecg" width="100%" height="18" viewBox="0 0 300 18" fill="none">
          <polyline points="0,9 60,9 70,3 78,15 84,1 90,17 96,9 140,9 150,3 158,15 164,1 170,17 176,9 300,9"
            stroke="#5bb8d4" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        </svg>
        <div class="p-detail-title">${p.name}</div>
        <div class="p-detail-price-row">
          <span class="p-detail-price">${p.price}</span>
          <span class="p-detail-orig">${p.orig}</span>
          <span class="p-detail-off">${p.off}</span>
        </div>
        <div class="p-detail-rating">
          <span class="p-detail-stars">${p.stars}</span>
          <span class="p-detail-reviews">${p.reviews}</span>
        </div>
        <div class="p-detail-desc">${p.desc}</div>
        <div class="p-detail-tags">${p.tags.map(t=>`<span class="p-detail-tag">${t}</span>`).join('')}</div>
        <div class="p-detail-actions">
          <button class="btn-cart">🛒 Add to Cart</button>
          <button class="btn-close-detail" onclick="closeActive(event)">✕ Close</button>
        </div>
      </div>
    `;
    card.addEventListener('click', (e) => handleCardClick(e, card));
    grid.appendChild(card);
  });
  document.getElementById('countLabel').textContent = `${items.length} Product${items.length!==1?'s':''} — Click any to explore`;
}

// Build combos
combos.forEach(c => {
  const el = document.createElement('div');
  el.className = 'combo-mini';
  el.innerHTML = `<span class="combo-mini-tag">${c.tag}</span><div class="combo-mini-name">${c.name}</div><div style="font-family:'Rajdhani',sans-serif;font-size:.82rem;color:var(--silver);margin-bottom:10px">${c.desc}</div><span class="combo-mini-price">${c.price}</span>`;
  combosGrid.appendChild(el);
});

buildGrid(products);

// ── ACTIVE CARD LOGIC ──────────────────────────────────────────────────
let activeCard = null;

function handleCardClick(e, card) {
  if (e.target.closest('.p-detail')) return; // don't toggle if clicking inside detail

  if (activeCard === card) {
    closeActive();
    return;
  }
  // Close previous
  if (activeCard) {
    activeCard.classList.remove('active','detail-below');
  }
  activeCard = card;
  card.classList.add('active');

  // Determine if panel should open below (card in bottom half of grid)
  const rect = card.getBoundingClientRect();
  const viewH = window.innerHeight;
  if (rect.top > viewH * 0.5) {
    card.classList.add('detail-below');
  }

  grid.classList.add('has-active');
  document.getElementById('backdrop').classList.add('visible');

  // Scroll card into view smoothly
  setTimeout(() => {
    card.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function closeActive(e) {
  if (e) e.stopPropagation();
  if (activeCard) {
    activeCard.classList.remove('active','detail-below');
    activeCard = null;
  }
  grid.classList.remove('has-active');
  document.getElementById('backdrop').classList.remove('visible');
}

document.getElementById('backdrop').addEventListener('click', closeActive);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeActive(); });

// ── SEARCH ─────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', filterProducts);

let activeFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    filterProducts();
  });
});

function filterProducts() {
  closeActive();
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = products.filter(p => {
    const matchCat = activeFilter === 'all' || p.category === activeFilter;
    const matchSearch = !q ||
      p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q)) ||
      p.categoryLabel.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  // show/hide combos based on filter
  const combosSection = document.getElementById('combosSection');
  combosSection.style.display = (activeFilter === 'all' || activeFilter === 'body') && !q ? '' : 'none';

  buildGrid(filtered);
}

// Cursor — only activate on real pointer devices
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0,cursorActive=false;
function activateCursor(){
  if(cursorActive)return;cursorActive=true;
  cur.style.display='block';ring.style.display='block';
  document.body.style.cursor='none';
  document.addEventListener('mousemove', e => { mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'; });
  (function loop(){ rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop); })();
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a,button,.p-card,.combo-mini,.filter-btn')) {
      cur.style.width='18px';cur.style.height='18px';ring.style.width='54px';ring.style.height='54px';
    } else {
      cur.style.width='12px';cur.style.height='12px';ring.style.width='40px';ring.style.height='40px';
    }
  });
}
window.addEventListener('mousemove', activateCursor, {once:true});
</script>
